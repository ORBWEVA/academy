<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" width="960" height="560" role="img" aria-label="npx @orbweva/academy — terminal preview showing the ORBWEVA Academy installer running">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC0A8"/>
      <stop offset="1" stop-color="#F39880"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#7A3B27" flood-opacity="0.28"/>
    </filter>
    <style>
      .mono { font-family: "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 14px; }
      .ui   { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .dim  { fill: #8A6A5F; }
      .fg   { fill: #231814; }
      .ok   { fill: #1E7A3A; }
      .acc  { fill: #0F5FA5; }
      .bold { font-weight: 600; }
    </style>
  </defs>

  <rect width="960" height="560" fill="url(#bg)"/>

  <!-- terminal window -->
  <g transform="translate(56,56)" filter="url(#shadow)">
    <!-- window body -->
    <rect width="848" height="448" rx="14" ry="14" fill="#FCE8DC"/>
    <!-- title bar strip -->
    <path d="M0 14 Q0 0 14 0 L834 0 Q848 0 848 14 L848 36 L0 36 Z" fill="#F4C4AE"/>
    <!-- traffic lights -->
    <circle cx="22"  cy="18" r="6" fill="#FF5F57"/>
    <circle cx="42"  cy="18" r="6" fill="#FEBC2E"/>
    <circle cx="62"  cy="18" r="6" fill="#28C840"/>
    <!-- title text -->
    <text x="424" y="22" class="ui" font-size="12" fill="#6E4A3C" text-anchor="middle">Terminal — ~</text>

    <!-- terminal content -->
    <g transform="translate(20,60)" class="mono">
      <!-- prompt line 1 -->
      <text y="0"><tspan class="dim">~ $ </tspan><tspan class="fg">npx @orbweva/academy</tspan></text>

      <!-- ascii banner (cyan-blue accent) -->
      <g class="acc bold">
        <text y="34">  ___  ____  ____  _    _  _____ _     _    </text>
        <text y="52"> / _ \|  _ \| __ )| |  | |/ ____| |   / \   </text>
        <text y="70">| | | | |_) |  _ \| |  | | |    | |  / _ \  </text>
        <text y="88">| |_| |  _ &lt;| |_) | |/\| | |___ | |_/ ___ \ </text>
        <text y="106"> \___/|_| \_\____/ \_/\_/ \____||___/_/   \_\</text>
      </g>

      <!-- tagline -->
      <text y="140"><tspan class="fg bold">ORBWEVA Academy</tspan><tspan class="dim"> — Claude Code skills installer</tspan></text>
      <text y="162" class="dim">Detected platform: macOS (arm64)</text>

      <!-- track + pack -->
      <text y="196"><tspan class="ok">→</tspan><tspan class="fg"> Track: </tspan><tspan class="fg bold">Accelerator</tspan></text>
      <text y="216"><tspan class="ok">→</tspan><tspan class="fg"> Packs: </tspan><tspan class="fg bold">Loka / LoLA</tspan></text>

      <!-- install progress -->
      <g class="fg">
        <text y="250"><tspan class="dim">[1/11] </tspan>ORBWEVA/secure-setup <tspan class="dim">... </tspan><tspan class="ok">✓ 1 skill</tspan></text>
        <text y="268"><tspan class="dim">[2/11] </tspan>ORBWEVA/orbweva-method <tspan class="dim">... </tspan><tspan class="ok">✓ 1 skill</tspan></text>
        <text y="286"><tspan class="dim">[3/11] </tspan>ORBWEVA/founder-discovery <tspan class="dim">... </tspan><tspan class="ok">✓ 1 skill</tspan></text>
        <text y="304" class="dim">  ...</text>
        <text y="322"><tspan class="dim">[11/11] </tspan>ORBWEVA/solo-agents <tspan class="dim">... </tspan><tspan class="ok">✓ 1 skill</tspan></text>
      </g>

      <!-- done -->
      <text y="356"><tspan class="ok">✓</tspan><tspan class="fg"> Installed 15 skills to </tspan><tspan class="dim">~/.claude/skills</tspan></text>
      <text y="378"><tspan class="fg">Done! Open Claude Code and try </tspan><tspan class="acc bold">/discovery:help</tspan><tspan class="fg"> to verify.</tspan></text>

      <!-- cursor -->
      <text y="410"><tspan class="dim">~ $ </tspan><tspan class="fg">█</tspan></text>
    </g>
  </g>
</svg>
