<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420" role="img" aria-label="npx @orbweva/academy — ORBWEVA Academy installer, Claude Code skills installer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1B1B1B"/>
      <stop offset="1" stop-color="#070707"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <style>
      .exo    { font-family: "Exo", "Exo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
      .mono   { font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 14px; }
      .banner { font-family: "JetBrains Mono", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 22px; letter-spacing: 0; }
      .dim    { fill: #7A7A7A; }
      .fg     { fill: #ECECEC; }
      .acc    { fill: #FFFFFF; }
      .bold   { font-weight: 600; }
    </style>
  </defs>

  <rect width="960" height="420" fill="url(#bg)"/>

  <!-- terminal window -->
  <g transform="translate(60,60)" filter="url(#shadow)">
    <rect width="840" height="300" rx="14" ry="14" fill="#121212" stroke="#2A2A2A" stroke-width="1"/>

    <!-- title bar -->
    <path d="M0 14 Q0 0 14 0 L826 0 Q840 0 840 14 L840 36 L0 36 Z" fill="#1C1C1C"/>
    <line x1="0" y1="36" x2="840" y2="36" stroke="#2A2A2A" stroke-width="1"/>
    <circle cx="22" cy="18" r="6" fill="#FF5F57"/>
    <circle cx="42" cy="18" r="6" fill="#FEBC2E"/>
    <circle cx="62" cy="18" r="6" fill="#28C840"/>
    <text x="420" y="22" class="exo" font-size="12" fill="#9A9A9A" text-anchor="middle">Terminal — ~</text>

    <!-- content -->
    <g transform="translate(24,64)">
      <text y="0" class="mono"><tspan class="dim">~ $ </tspan><tspan class="fg">npx github:ORBWEVA/academy</tspan></text>

      <!-- pure-block ORBWEVA banner — exact chars from src/banner.js -->
      <g class="banner acc bold" xml:space="preserve">
        <text y="42">█████ ████  ████  █   █ █████ █   █  ███ </text>
        <text y="66">█   █ █   █ █   █ █   █ █     █   █ █   █</text>
        <text y="90">█   █ ████  ████  █ █ █ ████  █   █ █████</text>
        <text y="114">█   █ █  █  █   █ ██ ██ █      █ █  █   █</text>
        <text y="138">█████ █   █ ████  █   █ █████   █   █   █</text>
      </g>

      <text y="180" class="mono"><tspan class="fg bold">ORBWEVA Academy</tspan><tspan class="dim"> — Claude Code skills installer</tspan></text>
      <text y="202" class="mono dim">Detected platform: macOS (arm64)</text>

      <text y="236" class="mono"><tspan class="dim">~ $ </tspan><tspan class="fg">█</tspan></text>
    </g>
  </g>
</svg>
